# 把浏览器 WASM「可写本地应用」（无 server）部署到 GitHub Pages。
# 构建：jasper-core → wasm（wasm-pack）+ VITE_LOCAL=1 的静态站点；base 自动取仓库名（项目页子路径）。
# 站点全程在浏览器内运行（IndexedDB 持久 + Chromium 下可打开真实本地文件夹，均无后端）。
# 注意：本文件在 paths-ignore(.github/**) 内 —— 只改本 workflow 的提交不会自动部署，
# 需在 Actions 页手动「Run workflow」触发一次；之后前端/core/wasm 改动照常自动部署。
name: Deploy WASM app to Pages

on:
  push:
    branches: [main]
    # 纯文档/截图提交不重建 demo（省资源）；改动前端/core/wasm/构建配置才触发。
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新推送取消进行中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
            wasm/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build wasm
        working-directory: web
        run: pnpm build:wasm

      - name: Build writable local app (Pages base path = /<repo>/)
        working-directory: web
        # 用 GITHUB_REPOSITORY（owner/repo，所有事件都在）取仓库名，push 与手动 workflow_dispatch 都稳。
        run: VITE_LOCAL=1 pnpm exec vite build --base="/${GITHUB_REPOSITORY##*/}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
