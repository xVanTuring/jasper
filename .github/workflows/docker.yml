# 构建 Docker 镜像并发布到 GitHub Container Registry (ghcr.io)。
# 镜像名取仓库名：ghcr.io/<owner>/<repo>（metadata-action 会自动转小写）。
# 触发：推到 main（打 latest + sha）、推 v* 版本 tag（打语义化版本）、手动。
name: Publish Docker image to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# 用内置 GITHUB_TOKEN 推 ghcr，需要 packages 写权限
permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 缓存，复用 cargo 依赖层，加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
