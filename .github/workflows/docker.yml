# 构建 Docker 镜像并发布到 GitHub Container Registry (ghcr.io)。
# 镜像名取仓库名：ghcr.io/<owner>/<repo>（统一转小写；GHCR 要求 lowercase）。
# 触发：只在推 v* 版本 tag（前缀匹配）或手动时发布——不再每次提交 main 都发包（省资源）。
#   发版：git tag v1.2.3 && git push origin v1.2.3 → 打 {version}/{major}.{minor}/sha + latest。
#
# 多架构（amd64 + arm64）：不用 QEMU 模拟（Rust release 编译在模拟下极慢），
# 改为每个架构各跑一台原生 runner（amd64→ubuntu-latest，arm64→免费的 ubuntu-24.04-arm，
# 公共仓库免费），各自 build + push by digest，再由 merge job 把两个 digest 合成一个
# multi-arch manifest 打上正式 tag。
name: Publish Docker image to GHCR

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# 用内置 GITHUB_TOKEN 推 ghcr，需要 packages 写权限
permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- 每个架构各在一台原生 runner 上构建，仅按 digest 推送（不打 tag）----
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # 计算小写镜像名（github.repository 可能含大写，registry 推送要求全小写）；
      # 顺便把 platform 里的 "/" 换成 "-" 供缓存 scope / artifact 名用
      - name: Prepare env
        run: |
          echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (labels & annotations)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # GitHub Actions 缓存按架构隔离 scope，避免 amd64/arm64 互相覆盖
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      # 把本架构镜像的 digest 落成一个空文件（文件名=digest），上传给 merge job 汇总
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---- 汇总各架构 digest，合成一个 multi-arch manifest 并打上正式 tag ----
  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Prepare env
        run: echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          # 只在 v* tag / 手动触发。semver tag 会自动补 `latest`（默认 flavor latest=auto）；
          # 手动在分支上跑则打分支名 + sha 便于调试。
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      # 用各架构 digest 组装 manifest list，一次性打上 meta 生成的全部 tag
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
